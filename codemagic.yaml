workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.onnoff.ambutime
      vars:
        BUNDLE_ID: "com.onnoff.ambutime"
        APP_STORE_APPLE_ID: 6763624759
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up signing
        script: |
          keychain initialize
          # Cree le certificat distribution s'il n'existe pas encore
          app-store-connect certificates create --type IOS_DISTRIBUTION --save 2>&1 || echo "Cert existe deja ou erreur non-critique"
          # Ajoute tous les certificats distribution a la keychain
          app-store-connect certificates list --type IOS_DISTRIBUTION --save
          keychain add-certificates
          # Cree le profil de provisioning pour ce bundle id
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --save
          xcode-project use-profiles
      - name: Build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # beta_groups retiré pour le premier build — Codemagic uploadera sur
        # TestFlight et l'app sera dispo pour les testeurs internes (App Manager).
        # Ajouter un groupe ici plus tard une fois créé dans App Store Connect.

  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.onnoff.ambutime"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK (debug - test pipeline)
        script: |
          flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
