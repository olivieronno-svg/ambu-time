workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: "com.onnoff.ambutime"
        APP_STORE_APPLE_ID: 6763624759
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Initialiser la keychain
        script: keychain initialize
      - name: Supprimer les anciens certificats de distribution (limite Apple = 2)
        script: |
          # Liste les certificats IOS_DISTRIBUTION en JSON et supprime-les tous
          # pour permettre la creation d'un nouveau.
          CERTS_JSON=$(app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>/dev/null || echo "[]")
          echo "Certificats existants :"
          echo "$CERTS_JSON"
          CERT_IDS=$(echo "$CERTS_JSON" | python3 -c "import sys,json; data=json.load(sys.stdin); print(' '.join([c['id'] for c in data]))")
          for id in $CERT_IDS; do
            echo "Suppression du certificat $id"
            app-store-connect certificates delete "$id" --ignore-not-found
          done
      - name: Generer la cle privee du certificat
        script: |
          # Genere une cle RSA 2048 bits qui servira de base au certificat
          openssl genrsa -out /tmp/cert_private_key.pem 2048
      - name: Creer le certificat de distribution iOS
        script: |
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:/tmp/cert_private_key.pem \
            --save
      - name: Ajouter les certificats a la keychain
        script: keychain add-certificates
      - name: Creer/recuperer le provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_private_key.pem \
            --create
      - name: Appliquer les profils au projet Xcode
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build ipa
        script: |
          # flutter clean evite tout cache local ou pre-build de l'IPA.
          # Les echo permettent de tracer dans les logs Codemagic la version
          # reellement compilee, pour diagnostiquer les collisions Apple Store
          # ("attribute value already used").
          # Les flags --build-name / --build-number sont passes explicitement
          # depuis pubspec.yaml pour eviter toute ambiguite avec Generated.xcconfig.
          flutter clean
          flutter pub get
          VERSION_FULL=$(grep "^version:" pubspec.yaml | sed 's/version:\s*//' | tr -d ' \r\n')
          BUILD_NAME=$(echo "$VERSION_FULL" | cut -d'+' -f1)
          BUILD_NUMBER=$(echo "$VERSION_FULL" | cut -d'+' -f2)
          echo "=== Version extracted from pubspec.yaml ==="
          echo "VERSION_FULL = $VERSION_FULL"
          echo "BUILD_NAME = $BUILD_NAME"
          echo "BUILD_NUMBER = $BUILD_NUMBER"
          echo "=== Generated.xcconfig ==="
          cat ios/Flutter/Generated.xcconfig | grep -E "FLUTTER_BUILD_(NAME|NUMBER)" || true
          flutter build ipa --release \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
          echo "=== IPA Info.plist after build ==="
          unzip -p build/ios/ipa/*.ipa Payload/*.app/Info.plist | plutil -p - 2>/dev/null | grep -E "Bundle(ShortVersion|Version)" || echo "Could not extract Info.plist from IPA"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # beta_groups retiré pour le premier build — Codemagic uploadera sur
        # TestFlight et l'app sera dispo pour les testeurs internes (App Manager).
        # Ajouter un groupe ici plus tard une fois créé dans App Store Connect.

  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.onnoff.ambutime"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK (debug - test pipeline)
        script: |
          flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
