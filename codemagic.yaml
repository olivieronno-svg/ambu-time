workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.onnoff.ambutime
      vars:
        BUNDLE_ID: "com.onnoff.ambutime"
        APP_STORE_APPLE_ID: 6763624759
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      # NOTE: PAS de "Set up signing" manuel ici.
      # Le bloc environment.ios_signing ci-dessus + l'integration
      # app_store_connect: Codemagic suffisent a Codemagic pour :
      # - Creer le certificat IOS_DISTRIBUTION si absent
      # - Creer le provisioning profile si absent
      # - Installer le tout dans la keychain avant build
      - name: Build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # beta_groups retiré pour le premier build — Codemagic uploadera sur
        # TestFlight et l'app sera dispo pour les testeurs internes (App Manager).
        # Ajouter un groupe ici plus tard une fois créé dans App Store Connect.

  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.onnoff.ambutime"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK (debug - test pipeline)
        script: |
          flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
