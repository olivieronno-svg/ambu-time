
name: ambulancier_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.13+26

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  fl_chart: ^1.2.0
  pdf: ^3.12.0
  printing: ^5.14.3
  purchases_flutter: ^9.16.0
  url_launcher: ^6.3.0
  speech_to_text: ^7.0.0
  path_provider: ^2.1.0
  share_plus: ^10.1.2
  flutter_tts: ^4.0.2
  http: ^1.2.0
  audioplayers: ^6.0.0
  file_picker: ^8.1.2
  google_mobile_ads: ^5.1.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  # Android
  android: true
  min_sdk_android: 21
  # iOS
  ios: true
  remove_alpha_ios: true  # Apple refuse l'alpha sur les icones iOS

flutter:
  uses-material-design: true
