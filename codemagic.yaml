workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.onnoff.ambutime
      vars:
        BUNDLE_ID: "com.onnoff.ambutime"
        APP_STORE_APPLE_ID: 6763624759
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up signing (auto-create certs + profiles)
        script: |
          keychain initialize
          # Récupère les signing files ; crée le certificat de distribution si absent
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key-path /tmp/ios_cert.p12 || true
          # Si aucun certificat distribution n'existe, en crée un nouveau
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --save || true
          # Retente la récupération des signing files (profils)
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # beta_groups retiré pour le premier build — Codemagic uploadera sur
        # TestFlight et l'app sera dispo pour les testeurs internes (App Manager).
        # Ajouter un groupe ici plus tard une fois créé dans App Store Connect.

  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.onnoff.ambutime"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK (debug - test pipeline)
        script: |
          flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
